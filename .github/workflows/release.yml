name: Auto Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  release:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get Latest Tag
        id: tag
        run: |
          latest=$(git describe --tags --abbrev=0 2>/dev/null || echo "v1.0.0")
          echo "LATEST=$latest" >> $GITHUB_ENV

      - name: Increment Patch Version
        run: |
          version=${LATEST#v}
          IFS='.' read major minor patch <<< "$version"
          patch=$((patch+1))
          newtag="v$major.$minor.$patch"
          echo "NEWTAG=$newtag" >> $GITHUB_ENV

      - name: Create Tag
        run: |
          git tag $NEWTAG
          git push origin $NEWTAG

      - name: Create Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create $NEWTAG --title "$NEWTAG" --notes "Automated Release"
