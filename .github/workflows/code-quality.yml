name: Code Quality Review

on:
  pull_request:

permissions:
  pull-requests: write
  contents: read

jobs:
  review:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install tools
        run: |
          pip install pycodestyle

      - name: Run pycodestyle
        run: |
          pycodestyle . > style.txt || true

      - name: Run analysis
        run: |
          python scripts/analyze.py > analysis.txt

      - name: Create report
        run: |
          echo "## Code Quality Report" > report.md
          echo "" >> report.md

          echo "### Pycodestyle" >> report.md
          if [ -s style.txt ]; then
            cat style.txt >> report.md
          else
            echo "PASS" >> report.md
          fi

          echo "" >> report.md
          echo "### Analysis" >> report.md
          cat analysis.txt >> report.md

      - name: Comment on PR
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('report.md', 'utf8');

            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: body
            });
